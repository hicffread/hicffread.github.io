<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anh Tuấn AOV - Bio Link</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-bg: #f8f9ff;
            --text-main: #333;
            --text-sub: #666;
            --accent-color: #6366f1;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--primary-bg);
            margin: 0;
            padding: 0;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* Hiệu ứng tuyết rơi */
        .snow-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        .snowflake {
            position: absolute;
            top: -10px;
            background: #9dd6ff;
            border-radius: 50%;
            opacity: 0.6;
            animation: fall linear infinite;
        }
        @keyframes fall {
            to { transform: translateY(105vh); }
        }

        /* Header */
        .header {
            text-align: center;
            padding: 40px 20px 10px;
            width: 100%;
            z-index: 20;
        }

        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 2px solid #ddd;
            object-fit: cover;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .name {
            font-size: 22px;
            font-weight: bold;
            margin: 5px 0;
        }

        .verified-icon {
            color: #1d9bf0;
            font-size: 18px;
            margin-left: 5px;
        }

        .title {
            color: var(--text-sub);
            font-size: 16px;
            margin-bottom: 20px;
        }

        /* Typing Effect Style */
        #typing-text {
            color: var(--accent-color);
            font-weight: bold;
            border-right: 2px solid var(--accent-color);
            padding-right: 5px;
            animation: blink 0.7s infinite;
        }
        @keyframes blink {
            50% { border-color: transparent; }
        }

        /* Social Icons */
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            z-index: 20;
        }

        .social-btn {
            width: 45px;
            height: 45px;
            background: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            text-decoration: none;
            font-size: 20px;
            transition: transform 0.2s;
        }
        .social-btn:hover { transform: scale(1.1); }

        .yt { color: #ff0000; }
        .zl { color: #0068ff; font-weight: bold; font-size: 14px; }
        .tg { color: #229ed9; }

        /* List Items */
        .list-container {
            width: 90%;
            max-width: 450px;
            z-index: 20;
        }

        .section-title {
            font-size: 18px;
            font-weight: bold;
            margin: 25px 0 15px;
            text-align: center;
        }

        .item-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 12px 15px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
            text-decoration: none;
            color: inherit;
        }

        .item-icon {
            width: 45px;
            height: 45px;
            border-radius: 10px;
            margin-right: 12px;
            object-fit: cover;
        }

        .item-info {
            flex-grow: 1;
        }

        .item-name {
            font-size: 14px;
            font-weight: bold;
            display: block;
        }

        .item-date {
            font-size: 11px;
            color: #999;
        }

        .download-icon {
            color: #e082ff;
            font-size: 20px;
        }

        .folder-box {
            width: 45px;
            height: 45px;
            background: #ffeb3b;
            border-radius: 10px;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .folder-box i { color: white; font-size: 24px; }

    </style>
</head>
<body>

    <div class="snow-overlay" id="snow"></div>

    <div class="header">
        <img src="https://i.imgur.com/qIufhof.png" alt="Avatar" class="avatar">
        <div class="name">Hi, i am <br> Anh Tuấn AOV <i class="fas fa-check-circle verified-icon"></i></div>
        <div class="title">and I'm a <span id="typing-text"></span></div>
    </div>

    <div class="social-icons">
        <a href="#" class="social-btn yt"><i class="fab fa-youtube"></i></a>
        <a href="#" class="social-btn zl">Zalo</a>
        <a href="#" class="social-btn tg"><i class="fab fa-telegram-plane"></i></a>
    </div>

    <div class="list-container">
        <div class="section-title">Tải Game</div>
        
        <a href="#" class="item-card">
            <img src="https://i.imgur.com/R2MvS6W.png" class="item-icon">
            <div class="item-info">
                <span class="item-name">Menu Hack Map AOV</span>
                <span class="item-date real-date"></span>
            </div>
            <i class="fas fa-cloud-download-alt download-icon"></i>
        </a>

        <a href="#" class="item-card">
            <img src="https://i.imgur.com/R2MvS6W.png" class="item-icon">
            <div class="item-info">
                <span class="item-name">Menu Mod Skin AOV</span>
                <span class="item-date real-date"></span>
            </div>
            <i class="fas fa-cloud-download-alt download-icon"></i>
        </a>

        <div class="section-title">Get Key AOV <i class="fas fa-spinner fa-spin" style="font-size: 14px; color: #999; margin-left: 5px;"></i></div>

        <a href="#" class="item-card">
            <img src="https://i.imgur.com/R2MvS6W.png" class="item-icon">
            <div class="item-info">
                <span class="item-name">Key Hack Map AOV</span>
                <span id="key-time" class="item-date"></span>
            </div>
            <i class="fas fa-cloud-download-alt download-icon"></i>
        </a>

        <div class="section-title">File Mod AOV</div>

        <a href="#" class="item-card">
            <div class="folder-box"><i class="fas fa-folder"></i></div>
            <div class="item-info">
                <span class="item-name">File Mod LQ 55 Skin</span>
                <span class="item-date real-date"></span>
            </div>
            <i class="fas fa-cloud-download-alt download-icon"></i>
        </a>
    </div>

    <div style="margin-bottom: 50px;"></div>

    <script>
        // Hiệu ứng Tuyết rơi
        const snowContainer = document.getElementById('snow');
        for (let i = 0; i < 30; i++) {
            const snow = document.createElement('div');
            snow.className = 'snowflake';
            snow.style.left = Math.random() * 100 + 'vw';
            snow.style.animationDuration = (Math.random() * 5 + 5) + 's';
            snow.style.width = snow.style.height = (Math.random() * 5 + 3) + 'px';
            snow.style.opacity = Math.random();
            snowContainer.appendChild(snow);
        }

        // Hiệu ứng Typing (Gõ chữ)
        const typingText = document.getElementById('typing-text');
        const words = ["Youtuber.", "Developer.", "Designer.", "Gamer."];
        let wordIndex = 0;
        let charIndex = 0;
        let isDeleting = false;

        function type() {
            const currentWord = words[wordIndex];
            if (isDeleting) {
                typingText.textContent = currentWord.substring(0, charIndex - 1);
                charIndex--;
            } else {
                typingText.textContent = currentWord.substring(0, charIndex + 1);
                charIndex++;
            }

            let typeSpeed = isDeleting ? 100 : 200;

            if (!isDeleting && charIndex === currentWord.length) {
                isDeleting = true;
                typeSpeed = 2000; // Nghỉ sau khi gõ xong
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                wordIndex = (wordIndex + 1) % words.length;
                typeSpeed = 500;
            }

            setTimeout(type, typeSpeed);
        }
        type();

        // Cập nhật Thời gian tự động
        function updateDateTime() {
            const now = new Date();
            const d = String(now.getDate()).padStart(2, '0');
            const m = String(now.getMonth() + 1).padStart(2, '0');
            const y = now.getFullYear();
            const dateStr = `${d}/${m}/${y}`;

            const hh = String(now.getHours()).padStart(2, '0');
            const mm = String(now.getMinutes()).padStart(2, '0');
            const ss = String(now.getSeconds()).padStart(2, '0');
            const timeStr = `${hh}:${mm}:${ss}, ${dateStr}`;

            document.getElementById('key-time').textContent = timeStr;
            const dates = document.querySelectorAll('.real-date');
            dates.forEach(el => el.textContent = dateStr);
        }
        setInterval(updateDateTime, 1000);
        updateDateTime();
    </script>
</body>
</html>
