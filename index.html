<script>
    // Hàm này giúp nhạc tự phát sau khi người dùng click vào trang
    function playMusic() {
        var audio = document.getElementById('bg-music');
        audio.play().catch(function(error) {
            console.log("Trình duyệt chặn tự động phát, chờ tương tác...");
        });
        // Sau khi phát rồi thì xóa sự kiện để không chạy lại mỗi khi click
        document.removeEventListener('click', playMusic);
        document.removeEventListener('touchstart', playMusic);
    }

    // Lắng nghe sự kiện click hoặc chạm màn hình (mobile)
    document.addEventListener('click', playMusic);
    document.addEventListener('touchstart', playMusic);
</script>
